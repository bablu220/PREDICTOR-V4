<button onclick="generateKey()">Generate 16-Digit Key</button>
<p id="displayKey"></p>

<script>
function generateKey() {
    let key = Array.from(Array(16), () => Math.floor(Math.random() * 36).toString(36).toUpperCase()).join('');
    key = key.match(/.{1,4}/g).join('-'); // Format: XXXX-XXXX-XXXX-XXXX
    document.getElementById('displayKey').innerText = key;
    alert("Nayi Key: " + key);
}
</script>
