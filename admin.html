<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #050a10; color: #00ff99; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 1px solid #00ff99; padding: 20px; border-radius: 15px; background: rgba(0, 255, 153, 0.1); box-shadow: 0 0 15px #00ff99; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #00ff99; background: transparent; color: white; }
        .btn { background: #00ff99; color: #000; padding: 15px; border: none; width: 90%; font-weight: bold; border-radius: 10px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>💎 ADMIN KEY MAKER</h2>
        <p>Predictor V4 Control</p>
        <input type="text" id="newKey" placeholder="Create License Key (e.g. KULA-100)">
        <br>
        <button class="btn" onclick="saveKey()">ACTIVATE KEY</button>
    </div>
    <script>
        function saveKey() {
            let key = document.getElementById('newKey').value;
            // Aapka Firebase URL
            let dbURL = "https://predictor-ai-c431f-default-rtdb.firebaseio.com/keys.json"; 
            if(!key) return alert("Bhai, pehle key likho!");
            fetch(dbURL, { method: 'POST', body: JSON.stringify({ license: key, status: "active" }) })
            .then(() => { 
                alert("Mubarak ho! Key " + key + " ab active hai."); 
                document.getElementById('newKey').value = ""; 
            });
        }
    </script>
</body>
</html>
