<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICTOR 4.0 - ADVANCED</title>
    <style>
        :root { --neon: #00ff99; --bg: #050a10; --red: #ff3333; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        .header { padding: 15px; border-bottom: 2px solid var(--neon); box-shadow: 0 0 20px var(--neon); background: rgba(0,255,153,0.05); }
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .tab-btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--neon); color: black; box-shadow: 0 0 10px var(--neon); }
        .main-box { border: 2px solid var(--neon); margin: 15px; padding: 25px; border-radius: 25px; background: linear-gradient(145deg, #0a1219, #050a10); box-shadow: inset 0 0 20px rgba(0,255,153,0.2); }
        .timer-label { color: #888; letter-spacing: 2px; font-size: 14px; }
        .timer { font-size: 45px; font-weight: bold; color: #ffcc00; text-shadow: 0 0 10px #ffcc00; margin: 10px 0; font-family: monospace; }
        .result-box { height: 100px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        .prediction { font-size: 60px; font-weight: 900; letter-spacing: 5px; display: none; animation: flash 1s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading-bar { width: 0%; height: 4px; background: var(--neon); position: absolute; bottom: 0; left: 0; transition: width 2s linear; }
        .btn-predict { background: var(--neon); color: black; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 90%; font-size: 18px; box-shadow: 0 5px 15px rgba(0,255,153,0.4); }
        .btn-predict:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header"><h2>PREDICTOR 4.0 🧩</h2></div>
    
    <div class="tabs">
        <button id="btn30" class="tab-btn" onclick="setMode(30)">WinGo 30s</button>
        <button id="btn60" class="tab-btn active" onclick="setMode(60)">WinGo 1min</button>
    </div>

    <div class="main-box" style="position:relative">
        <div class="timer-label" id="mode-text">1 MINUTE REMAINING</div>
        <div id="timer" class="timer">00:00</div>
        
        <div class="result-box">
            <div id="loading" style="display:none; color:var(--neon)">🔍 ANALYZING SERVER...</div>
            <div id="result" class="prediction">BIG</div>
        </div>

        <button id="predictBtn" class="btn-predict" onclick="startPrediction()">GET PREDICTION</button>
        <div id="p-bar" class="loading-bar"></div>
    </div>

    <script>
        let currentMode = 60;
        let canPredict = true;

        function setMode(m) {
            currentMode = m;
            document.getElementById('btn30').classList.toggle('active', m === 30);
            document.getElementById('btn60').classList.toggle('active', m === 60);
            document.getElementById('mode-text').innerText = m === 30 ? "30 SECONDS REMAINING" : "1 MINUTE REMAINING";
            document.getElementById('result').style.display = "none";
        }

        // Timer Logic synced with real clock
        setInterval(() => {
            const now = new Date();
            const totalSeconds = now.getSeconds() + (now.getMinutes() * 60);
            const remaining = currentMode - (totalSeconds % currentMode);
            
            document.getElementById('timer').innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);
            
            // Auto-reset when timer hits 0
            if(remaining === currentMode || remaining > currentMode - 2) {
                if(!canPredict) {
                    document.getElementById('result').style.display = "none";
                    document.getElementById('predictBtn').disabled = false;
                    canPredict = true;
                }
            }
        }, 1000);

        function startPrediction() {
            canPredict = false;
            document.getElementById('predictBtn').disabled = true;
            document.getElementById('loading').style.display = "block";
            document.getElementById('result').style.display = "none";
            document.getElementById('p-bar').style.width = "100%";

            setTimeout(() => {
                const results = ["BIG", "SMALL", "BIG", "SMALL", "SMALL"];
                const res = results[Math.floor(Math.random() * results.length)];
                
                document.getElementById('loading').style.display = "none";
                document.getElementById('p-bar').style.width = "0%";
                
                const resultDiv = document.getElementById('result');
                resultDiv.innerText = res;
                resultDiv.style.display = "block";
                resultDiv.style.color = (res === "BIG") ? "#00ff99" : "#ff3333";
                resultDiv.style.textShadow = `0 0 20px ${(res === "BIG") ? "#00ff99" : "#ff3333"}`;
            }, 2500);
        }
    </script>
</body>
</html>
