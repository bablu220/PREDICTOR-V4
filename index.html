<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICTOR 4.0 - LIVE</title>
    <style>
        :root { --neon: #00ff99; --bg: #050a10; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .header { padding: 15px; border-bottom: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon); }
        .user-bar { display: flex; justify-content: space-around; padding: 10px; background: rgba(0,255,153,0.1); font-size: 12px; }
        .main-box { border: 2px solid var(--neon); margin: 20px; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.5); }
        .timer { font-size: 30px; font-weight: bold; color: #ffcc00; margin: 10px 0; }
        .prediction { font-size: 50px; font-weight: bold; text-shadow: 0 0 20px var(--neon); margin: 20px 0; display: none; }
        .btn-predict { background: var(--neon); color: black; padding: 15px 40px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 80%; }
        .loading { display: none; color: var(--neon); font-style: italic; }
    </style>
</head>
<body>

    <div class="header"><h2>PREDICTOR 4.0 🧩</h2></div>
    <div class="user-bar">
        <span>👤 USER: KULAMANI</span>
        <span style="color:var(--neon)">● SERVER ACTIVE</span>
    </div>

    <div class="main-box">
        <h3 style="color:#aaa">NEXT PERIOD COUNTDOWN</h3>
        <div id="timer" class="timer">00:60</div>
        
        <div id="loading" class="loading">ANALYZING SERVER DATA...</div>
        <div id="result" class="prediction">BIG</div>

        <button id="predictBtn" class="btn-predict" onclick="getPrediction()">GET PREDICTION</button>
    </div>

    <script>
        // Timer Logic
        let seconds = 60;
        setInterval(() => {
            seconds--;
            if(seconds < 0) seconds = 59;
            document.getElementById('timer').innerText = "00:" + (seconds < 10 ? "0" + seconds : seconds);
            if(seconds == 0) {
                document.getElementById('result').style.display = "none";
                document.getElementById('predictBtn').disabled = false;
            }
        }, 1000);

        function getPrediction() {
            document.getElementById('predictBtn').disabled = true;
            document.getElementById('loading').style.display = "block";
            document.getElementById('result').style.display = "none";

            setTimeout(() => {
                const results = ["BIG", "SMALL", "BIG", "BIG", "SMALL"];
                const random = results[Math.floor(Math.random() * results.length)];
                
                document.getElementById('loading').style.display = "none";
                document.getElementById('result').innerText = random;
                document.getElementById('result').style.display = "block";
                document.getElementById('result').style.color = (random === "BIG") ? "#00ff99" : "#ff3333";
            }, 3000);
        }
    </script>
</body>
</html>
