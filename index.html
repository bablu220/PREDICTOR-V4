<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICTOR 4.0 | KULAMANI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff99; --bg: #01080e; --red: #ff3e3e; --green: #00ff73; --violet: #b042ff; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; overflow-x: hidden; }

        /* Cyber Background */
        .cyber-bg { position: fixed; inset: 0; background: radial-gradient(circle at center, #0a1a2a 0%, #01080e 100%); z-index: -2; }
        .grid { position: fixed; inset: 0; background-image: linear-gradient(var(--neon) 1px, transparent 1px), linear-gradient(90deg, var(--neon) 1px, transparent 1px); background-size: 45px 45px; opacity: 0.03; z-index: -1; }

        /* Screen Management */
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; animation: scanIn 0.4s ease-out; }
        @keyframes scanIn { from { filter: brightness(2); opacity: 0; } to { filter: brightness(1); opacity: 1; } }

        /* Stage 1: Verification (image_17.png) */
        .auth-card { background: rgba(10, 25, 40, 0.9); border: 1px solid var(--neon); padding: 30px; border-radius: 15px; text-align: center; width: 100%; max-width: 340px; margin-top: 10vh; box-shadow: 0 0 25px rgba(0, 255, 153, 0.2); }
        .lock-img { width: 70px; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--neon)); }
        .auth-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--neon); border-radius: 5px; margin: 15px 0; text-align: center; font-family: 'Orbitron'; letter-spacing: 2px; }

        /* Stage 2: Multi-Game Lobby (image_12.png) */
        .lobby-header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .p-info { font-family: 'Orbitron'; color: var(--neon); font-size: 14px; }
        
        .game-grid { width: 100%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-card { background: #0a1118; border: 1px solid #1a2a3a; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .game-card:hover { border-color: var(--neon); transform: translateY(-5px); background: rgba(0, 255, 153, 0.05); }
        .game-card img { width: 50px; height: 50px; margin-bottom: 10px; border-radius: 8px; }
        .game-card span { display: block; font-weight: bold; font-size: 13px; color: #ddd; }

        /* Stage 3: Engine (image_16.png) */
        .engine-box { background: #070f18; border: 1px solid var(--neon); padding: 20px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 13px; }
        .timer { color: #ffcc00; font-weight: bold; font-size: 18px; }
        .ball { width: 90px; height: 90px; border-radius: 50%; background: #222; border: 4px solid #444; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 900; font-family: 'Orbitron'; transition: 0.5s; }

        /* Buttons */
        .btn-pro { width: 100%; padding: 14px; border-radius: 8px; border: none; background: var(--neon); color: black; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; font-size: 14px; text-transform: uppercase; }
        .btn-back { background: none; border: 1px solid #333; color: #888; padding: 5px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="grid"></div>

    <div id="scr-auth" class="screen active">
        <div class="auth-card">
            <img src="https://img.icons8.com/neon-gradient/96/lock.png" class="lock-img">
            <h2 style="font-family:'Orbitron'; margin:0;">ACCESS</h2>
            <h2 style="font-family:'Orbitron'; color:var(--neon); margin:0;">VERIFICATION</h2>
            <p style="font-size:11px; color:#666;">AUTHORIZATION REQUIRED FOR KULAMANI BOT</p>
            <input type="text" id="key" class="auth-input" placeholder="LICENSE KEY">
            <button class="btn-pro" onclick="verify()">VALIDATE KEY</button>
            <p style="font-size:10px; color:#444; margin-top:20px;">KEY DEVICE LOCK: ON</p>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <div class="lobby-header">
            <div class="p-info">USER: KULAMANI</div>
            <div style="font-size:10px; color:var(--green);">● SERVER ONLINE</div>
        </div>
        <h3 style="font-family:'Orbitron'; letter-spacing:2px;">SELECT GAME</h3>
        <div class="game-grid">
            <div class="game-card" onclick="selectGame('SIKKIM GAME')">
                <img src="https://img.icons8.com/color/96/crown.png"><span>SIKKIM</span>
            </div>
            <div class="game-card" onclick="selectGame('LOTTERY 7')">
                <img src="https://img.icons8.com/color/96/7-circle.png"><span>LOTTERY 7</span>
            </div>
            <div class="game-card" onclick="selectGame('GOA GAME')">
                <img src="https://img.icons8.com/color/96/beach.png"><span>GOA GAME</span>
            </div>
            <div class="game-card" onclick="selectGame('DAMAN GAMES')">
                <img src="https://img.icons8.com/color/96/diamond.png"><span>DAMAN</span>
            </div>
        </div>
    </div>

    <div id="scr-engine" class="screen">
        <button class="btn-back" onclick="showScreen('scr-lobby')">◀ CHANGE GAME</button>
        <div class="engine-box">
            <h2 id="gameTitle" style="color:var(--neon); font-family:'Orbitron'; margin-bottom:5px;">GAME</h2>
            <div class="status-bar">
                <div style="text-align:left;">PERIOD<br><span id="period" style="color:white; font-weight:bold;">---</span></div>
                <div style="text-align:right;">TIME<br><span id="timer" class="timer">00:00</span></div>
            </div>

            <div id="ball" class="ball">?</div>
            <div id="resTxt" style="font-size:35px; font-weight:900; letter-spacing:5px; height:45px;">---</div>
            
            <div style="display:flex; gap:10px; margin:20px 0;">
                <button class="btn-pro" style="background:#222; color:var(--neon); border:1px solid var(--neon);" onclick="setMode('30s')">30S</button>
                <button class="btn-pro" style="background:#222; color:var(--neon); border:1px solid var(--neon);" onclick="setMode('1m')">1M</button>
            </div>

            <button class="btn-pro" id="pBtn" onclick="analyze()">GET PREDICTION</button>
        </div>
    </div>

    <script>
        let mode = '30s';
        function verify() { if(document.getElementById('key').value.length > 2) showScreen('scr-lobby'); }
        function selectGame(name) { 
            document.getElementById('gameTitle').innerText = name;
            showScreen('scr-engine');
            startClock();
        }
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                const d = now.getFullYear().toString() + (now.getMonth()+1).toString().padStart(2,'0') + now.getDate().toString().padStart(2,'0');
                let sec = now.getSeconds();
                let remain = mode === '30s' ? 30 - (sec % 30) : 60 - sec;
                let count = mode === '30s' ? (now.getHours()*120 + now.getMinutes()*2 + (sec>=30?1:0)) : (now.getHours()*60 + now.getMinutes());
                
                document.getElementById('period').innerText = d + "10001" + count.toString().padStart(4, '0');
                document.getElementById('timer').innerText = "00:" + (remain < 10 ? "0"+remain : remain);
                if(remain === (mode==='30s'?30:60)) resetBall();
            }, 1000);
        }

        function analyze() {
            const btn = document.getElementById('pBtn');
            const ball = document.getElementById('ball');
            const res = document.getElementById('resTxt');
            btn.disabled = true;
            ball.innerText = "⏳";
            res.innerText = "WAIT...";

            setTimeout(() => {
                const n = Math.floor(Math.random() * 10);
                const isBig = n >= 5;
                let color = (n%2===0) ? "var(--red)" : "var(--green)";
                if(n===0 || n===5) color = "var(--violet)";
                
                ball.innerText = n;
                ball.style.background = color;
                ball.style.boxShadow = `0 0 25px ${color}`;
                res.innerText = isBig ? "BIG" : "SMALL";
                res.style.color = color;
            }, 2000);
        }

        function resetBall() {
            document.getElementById('pBtn').disabled = false;
            const ball = document.getElementById('ball');
            ball.innerText = "?"; ball.style.background = "#222"; ball.style.boxShadow = "none";
            document.getElementById('resTxt').innerText = "---";
            document.getElementById('resTxt').style.color = "white";
        }
    </script>
</body>
</html>
