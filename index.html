<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PREDICTOR PRO - KULAMANI</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --neon: #00ff99; --bg: #050a10; }
        body { background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; text-align: center; margin: 0; }
        
        /* Login Screen */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .key-input { background: transparent; border: 2px solid var(--neon); padding: 15px; color: white; width: 80%; border-radius: 10px; text-align: center; font-size: 18px; margin-bottom: 20px; }
        .btn-login { background: var(--neon); color: black; padding: 15px 40px; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; box-shadow: 0 0 20px var(--neon); }

        /* Dashboard (Hidden by default) */
        #dashboard { display: none; padding: 20px; }
        .ball-container { width: 100px; height: 100px; border-radius: 50%; border: 5px solid var(--neon); margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; position: relative; overflow: hidden; }
        .ball-spinning { animation: spin 0.5s infinite linear; border-color: #ffcc00; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .prediction-text { font-size: 30px; margin-top: 10px; text-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color:var(--neon)">ENTER 16-DIGIT LICENSE KEY</h2>
        <input type="text" id="license-key" class="key-input" placeholder="XXXX-XXXX-XXXX-XXXX">
        <button class="btn-login" onclick="validateLogin()">ACTIVATE SYSTEM</button>
        <p id="login-msg" style="margin-top:15px; font-size:12px;"></p>
    </div>

    <div id="dashboard">
        <div class="header"><h3>AI PREDICTOR V4.0 PRO</h3></div>
        
        <div class="main-card" style="border: 1px solid var(--neon); border-radius: 20px; padding: 20px; margin-top: 20px;">
            <div id="game-ball" class="ball-container">?</div>
            <div id="res-text" class="prediction-text">READY...</div>
            
            <div style="margin: 20px 0; font-size: 20px; color: #ffcc00;">PERIOD: <span id="period">Loading...</span></div>
            
            <button class="btn-login" id="predBtn" onclick="runProfessionalAI()">START PREDICTION</button>
        </div>
    </div>

    <script>
        // Firebase config yahan paste karna (Admin Panel wala)
        const firebaseConfig = { /* APNI CONFIG DALO */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function validateLogin() {
            const key = document.getElementById('license-key').value;
            const msg = document.getElementById('login-msg');
            msg.innerText = "VERIFYING WITH SERVER...";
            
            // Firebase check logic (Simplified for demo)
            if(key.length === 19) { // 16 digits + 3 dashes
                msg.style.color = var(--neon);
                msg.innerText = "ACCESS GRANTED!";
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    startTimer();
                }, 1500);
            } else {
                msg.style.color = "red";
                msg.innerText = "INVALID OR EXPIRED KEY!";
            }
        }

        function startTimer() {
            setInterval(() => {
                const now = new Date();
                const period = now.getFullYear().toString() + (now.getMonth()+1).toString() + now.getDate().toString() + "1000" + (now.getHours() * 60 + now.getMinutes());
                document.getElementById('period').innerText = period;
            }, 1000);
        }

        function runProfessionalAI() {
            const ball = document.getElementById('game-ball');
            const text = document.getElementById('res-text');
            const btn = document.getElementById('predBtn');

            btn.disabled = true;
            ball.classList.add('ball-spinning');
            ball.innerText = "?";
            text.innerText = "ANALYZING PATTERNS...";

            setTimeout(() => {
                ball.classList.remove('ball-spinning');
                const num = Math.floor(Math.random() * 10);
                const type = (num >= 5) ? "BIG" : "SMALL";
                const color = (num % 2 === 0) ? "#ff3333" : "#00ff99";

                ball.innerText = num;
                ball.style.borderColor = color;
                text.innerText = type;
                text.style.color = color;
                btn.disabled = false;
            }, 3000);
        }
    </script>
</body>
</html>
