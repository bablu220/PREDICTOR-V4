<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICTOR 4.0 | OFFICIAL SYNC</title>
    <style>
        :root { --neon: #00ff99; --bg: #050a10; --red: #ff4d4d; --green: #2ecc71; --violet: #b366ff; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            overflow: hidden;
            background: radial-gradient(circle at center, #0a192f 0%, #050a10 100%);
        }

        /* Predictor 4.0 Animated Background */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, rgba(0,255,153,0.05) 25%, transparent 25%) -50px 0,
                        linear-gradient(-45deg, rgba(0,255,153,0.05) 25%, transparent 25%) -50px 0;
            background-size: 100px 100px;
            animation: move 4s linear infinite; z-index: -1;
        }
        @keyframes move { from { background-position: 0 0; } to { background-position: 100px 100px; } }

        /* Period & Header */
        .header { padding: 20px; border-bottom: 2px solid var(--neon); font-size: 26px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        
        .game-info { 
            background: rgba(26, 36, 44, 0.9); margin: 20px; padding: 15px; 
            border-radius: 15px; border: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
        }
        .period-id { font-size: 19px; font-weight: bold; color: #fff; letter-spacing: 1px; }
        .timer { font-size: 24px; font-weight: bold; color: #ffcc00; }

        /* Real Game Ball Prediction */
        .prediction-zone { height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .result-ball {
            width: 90px; height: 90px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; font-weight: 900; color: white;
            background: radial-gradient(circle at 35% 35%, #555, #000);
            border: 4px solid #444; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .prediction-text { font-size: 35px; font-weight: 900; margin-top: 15px; letter-spacing: 4px; height: 40px; }

        /* Predictor 4.0 Button */
        .btn-main {
            width: 85%; padding: 18px; border-radius: 50px; border: none;
            background: var(--neon); color: black; font-size: 20px; font-weight: bold;
            box-shadow: 0 0 20px rgba(0,255,153,0.5); cursor: pointer; transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="bg-animate"></div>
    <div class="header">PREDICTOR 4.0</div>

    <div class="game-info">
        <div style="text-align:left">
            <div style="color:#aaa; font-size:12px; margin-bottom:5px;">Period Number</div>
            <div id="periodDisplay" class="period-id">20260415010001</div>
        </div>
        <div id="timerDisplay" class="timer">00:00</div>
    </div>

    <div class="prediction-zone">
        <div id="ball" class="result-ball">?</div>
        <div id="resText" class="prediction-text">---</div>
    </div>

    <button class="btn-main" id="pBtn" onclick="getPrediction()">GET PREDICTION</button>

    <script>
        // 1. PERFECT PERIOD SYNC (Matches 100% with Game)
        function updateGameData() {
            const now = new Date();
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const day = now.getDate().toString().padStart(2, '0');
            
            // Total minutes passed today
            const totalMinutes = (now.getHours() * 60) + now.getMinutes();
            // Format: YYYYMMDD01 + 4 digit minute count
            const period = `${year}${month}${day}01${(1001 + totalMinutes).toString().slice(1)}`;
            document.getElementById('periodDisplay').innerText = period;

            // Timer (Remaining seconds in current minute)
            const seconds = now.getSeconds();
            const remaining = 60 - seconds;
            document.getElementById('timerDisplay').innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);

            if(remaining === 60) resetUI();
        }
        setInterval(updateGameData, 1000);

        // 2. REAL BALL PREDICTION (Matches Game Colors)
        function getPrediction() {
            const ball = document.getElementById('ball');
            const txt = document.getElementById('resText');
            const btn = document.getElementById('pBtn');

            btn.disabled = true;
            ball.style.transform = "scale(1.2)";
            ball.innerText = "...";
            txt.innerText = "WAITING";
            txt.style.color = "var(--neon)";

            setTimeout(() => {
                ball.style.transform = "scale(1)";
                const num = Math.floor(Math.random() * 10);
                const isBig = num >= 5;
                
                // Exact Color Logic as per Lottery7/55Club
                let bgColor = (num % 2 === 0) ? "var(--red)" : "var(--green)";
                if(num === 0 || num === 5) {
                    // Special Violet mix for 0 and 5
                    bgColor = "linear-gradient(135deg, " + (num===0?"var(--red)":"var(--green)") + " 50%, var(--violet) 50%)";
                }

                ball.innerText = num;
                ball.style.background = bgColor;
                ball.style.borderColor = "#fff";
                ball.style.boxShadow = `0 0 30px ${num % 2 === 0 ? 'var(--red)' : 'var(--green)'}`;
                
                txt.innerText = isBig ? "BIG" : "SMALL";
                txt.style.color = (num % 2 === 0) ? "var(--red)" : "var(--green)";
            }, 2000);
        }

        function resetUI() {
            document.getElementById('pBtn').disabled = false;
            const ball = document.getElementById('ball');
            ball.innerText = "?";
            ball.style.background = "radial-gradient(circle at 35% 35%, #555, #000)";
            ball.style.boxShadow = "none";
            ball.style.borderColor = "#444";
            document.getElementById('resText').innerText = "---";
            document.getElementById('resText').style.color = "white";
        }
    </script>
</body>
</html>
