<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICTOR 4.0 | ULTIMATE</title>
    <style>
        :root { --neon: #00ff99; --bg: #060c12; --red: #ff4d4d; --green: #2ecc71; --violet: #b366ff; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; text-align: center; }
        
        /* 1. KEY VERIFICATION OVERLAY */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { border: 1px solid var(--neon); padding: 30px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,255,153,0.2); width: 80%; }
        input { width: 90%; padding: 15px; margin: 20px 0; background: transparent; border: 1px solid var(--neon); color: white; border-radius: 10px; text-align: center; letter-spacing: 2px; }

        /* 2. LOBBY & PERIOD MATCH */
        .header { background: #1a242c; padding: 20px; border-bottom: 2px solid var(--neon); font-size: 22px; font-weight: 900; color: var(--neon); }
        .status-bar { display: flex; justify-content: space-between; padding: 15px 25px; background: #11181f; margin: 15px; border-radius: 12px; border: 1px solid #333; }
        .period-id { font-size: 18px; font-weight: bold; color: #fff; }
        .timer { font-size: 22px; font-weight: bold; color: #ffcc00; }

        /* 3. REAL GAME BALLS */
        .ball-zone { height: 160px; display: flex; justify-content: center; align-items: center; }
        .game-ball { 
            width: 90px; height: 90px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 50px; font-weight: 900; color: white;
            transition: 0.4s; position: relative;
            background: radial-gradient(circle at 35% 35%, #555, #000);
            border: 4px solid #444;
        }

        /* Result Animation */
        .res-box { font-size: 38px; font-weight: 900; margin: 10px 0; height: 50px; letter-spacing: 3px; }
        .btn-predict { 
            width: 85%; padding: 16px; border-radius: 50px; border: none;
            background: linear-gradient(180deg, var(--neon), #00b36b);
            color: black; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,255,153,0.4);
        }
        .btn-predict:disabled { background: #333; color: #666; box-shadow: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 style="color:var(--neon)">PREDICTOR 4.0 LOGIN</h2>
            <input type="text" id="keyBox" placeholder="ENTER 16-DIGIT KEY">
            <button class="btn-predict" onclick="verifyKey()">LOGIN SYSTEM</button>
            <p id="err" style="color:red; display:none; margin-top:10px;">INVALID KEY!</p>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <div class="header">PREDICTOR 4.0</div>
        
        <div class="status-bar">
            <div style="text-align:left">
                <div style="color:#888; font-size:12px;">Period Number</div>
                <div id="period" class="period-id">20260415010001</div>
            </div>
            <div id="timer" class="timer">00:60</div>
        </div>

        <div class="ball-zone">
            <div id="ball" class="game-ball">?</div>
        </div>

        <div id="result" class="res-box">---</div>
        <button class="btn-predict" id="pBtn" onclick="runPrediction()">GET PREDICTION</button>
    </div>

    <script>
        // 1. Key Verification Logic
        function verifyKey() {
            const key = document.getElementById('keyBox').value;
            if(key.length >= 12) { // Minimum 12-16 chars check
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                startSync();
            } else {
                document.getElementById('err').style.display = 'block';
            }
        }

        // 2. Real-Time Period Sync (Lottery7 Style)
        function startSync() {
            setInterval(() => {
                const now = new Date();
                const datePart = now.getFullYear().toString() + (now.getMonth() + 1).toString().padStart(2, '0') + now.getDate().toString().padStart(2, '0');
                const totalMins = (now.getHours() * 60) + now.getMinutes();
                const period = `${datePart}01${(1000 + totalMins).toString().slice(1)}`;
                document.getElementById('period').innerText = period;

                const seconds = now.getSeconds();
                const remain = 60 - seconds;
                document.getElementById('timer').innerText = "00:" + (remain < 10 ? "0" + remain : remain);
                
                if(remain === 60) resetUI();
            }, 1000);
        }

        // 3. Game-Style Ball Prediction
        function runPrediction() {
            const ball = document.getElementById('ball');
            const res = document.getElementById('result');
            const btn = document.getElementById('pBtn');

            btn.disabled = true;
            ball.innerText = " shuffling...";
            ball.style.fontSize = "12px";
            res.innerText = "ANALYZING...";

            setTimeout(() => {
                const num = Math.floor(Math.random() * 10);
                const isBig = num >= 5;
                
                // Real Color Logic: Red (0,2,4,6,8), Green (1,3,5,7,9), 0 & 5 can be Violet mix
                let color = (num % 2 === 0) ? "var(--red)" : "var(--green)";
                if(num === 0 || num === 5) color = "var(--violet)";

                ball.innerText = num;
                ball.style.fontSize = "50px";
                ball.style.background = color;
                ball.style.borderColor = "#fff";
                ball.style.boxShadow = `0 0 30px ${color}`;
                
                res.innerText = isBig ? "BIG" : "SMALL";
                res.style.color = color;
            }, 2500);
        }

        function resetUI() {
            document.getElementById('pBtn').disabled = false;
            const ball = document.getElementById('ball');
            ball.innerText = "?";
            ball.style.background = "radial-gradient(circle at 35% 35%, #555, #000)";
            ball.style.boxShadow = "none";
            document.getElementById('result').innerText = "---";
            document.getElementById('result').style.color = "white";
        }
    </script>
</body>
</html>
