<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICTOR 4.0 - KULAMANI</title>
    <style>
        :root { --neon: #00ff99; --bg: #050a10; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        .header { padding: 15px; border-bottom: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .user-bar { display: flex; justify-content: space-around; padding: 12px; background: rgba(0,255,153,0.1); margin: 10px; border-radius: 8px; font-size: 14px; border: 1px solid rgba(0,255,153,0.2); }
        .status { color: var(--neon); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .game-section { padding: 20px; }
        .game-card { background: linear-gradient(180deg, rgba(20,20,20,1) 0%, rgba(5,5,5,1) 100%); border: 1px solid var(--neon); margin-bottom: 20px; border-radius: 15px; padding: 25px; position: relative; overflow: hidden; }
        .hot-tag { background: #ff0000; color: white; font-size: 10px; padding: 3px 10px; border-radius: 5px; position: absolute; top: 10px; right: 10px; font-weight: bold; }
        .btn-start { background: transparent; color: var(--neon); border: 2px solid var(--neon); padding: 12px 30px; border-radius: 10px; font-weight: bold; margin-top: 15px; width: 100%; transition: 0.3s; cursor: pointer; text-transform: uppercase; }
        .btn-start:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }
        h1, h2 { letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color: var(--neon); margin: 0;">PREDICTOR 4.0 🧩</h2>
    </div>

    <div class="user-bar">
        <span>👤 Kulamani Mahanta</span>
        <span class="status">💎 SECURE CONNECTION ESTABLISHED</span>
    </div>

    <div class="game-section">
        <h3 style="color: #aaa; text-transform: uppercase; font-size: 12px;">Select Your Game Node</h3>
        
        <div class="game-card">
            <span class="hot-tag">🔥 HOT</span>
            <h1 style="margin: 10px 0;">55 CLUB</h1>
            <p style="color: var(--neon); font-size: 14px;">WINGO 1-MINUTE PREDICTOR</p>
            <button class="btn-start" onclick="location.href='#'">Start Analysis</button>
        </div>

        <div class="game-card">
            <h1 style="margin: 10px 0;">WINGO TRADING</h1>
            <p style="color: var(--neon); font-size: 14px;">MULTI-SERVER SYNC ACTIVE</p>
            <button class="btn-start" onclick="location.href='#'">Sync Node</button>
        </div>
    </div>

    <footer style="padding: 20px; color: #444; font-size: 10px;">
        OFFICIAL OWNER: @KULAMANI_MAHANTA | VERSION 4.0.0
    </footer>

</body>
</html>
