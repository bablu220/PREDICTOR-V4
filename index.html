<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICTOR 4.0 | OFFICIAL BOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff99; --bg: #02060b; --red: #ff3e3e; --green: #00ff73; --violet: #b042ff; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; overflow: hidden; }

        /* GRAPHIC BACKGROUND */
        .grid { position: fixed; inset: 0; background-image: linear-gradient(var(--neon) 1px, transparent 1px), linear-gradient(90deg, var(--neon) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.05; z-index: -1; animation: move 20s linear infinite; }
        @keyframes move { from { background-position: 0 0; } to { background-position: 0 1000px; } }

        /* SCREENS */
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        /* KEY LOGIN SCREEN */
        .login-card { background: rgba(10, 20, 30, 0.9); border: 2px solid var(--neon); padding: 40px; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 255, 153, 0.3); text-align: center; width: 100%; max-width: 350px; }
        .input-key { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--neon); color: var(--neon); border-radius: 10px; margin: 20px 0; text-align: center; font-family: 'Orbitron'; letter-spacing: 2px; box-sizing: border-box; }

        /* LOBBY SCREEN */
        .lobby-title { font-family: 'Orbitron'; color: var(--neon); font-size: 24px; margin-bottom: 30px; text-shadow: 0 0 10px var(--neon); }
        .game-card { width: 100%; max-width: 320px; background: #111; border: 1px solid #333; padding: 20px; margin: 10px 0; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--neon); background: rgba(0, 255, 153, 0.1); transform: scale(1.02); }

        /* ENGINE SCREEN */
        .status-header { width: 100%; max-width: 380px; display: flex; justify-content: space-between; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; }
        .ball-engine { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #555, #000); border: 5px solid #444; display: flex; align-items: center; justify-content: center; font-size: 60px; font-weight: 900; font-family: 'Orbitron'; margin: 30px 0; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .main-btn { width: 100%; max-width: 320px; padding: 18px; border-radius: 50px; border: none; background: var(--neon); color: black; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 0 20px var(--neon); font-family: 'Orbitron'; }
        
        .admin-badge { position: absolute; top: 15px; right: 15px; background: #ff0000; padding: 5px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="grid"></div>

    <div id="scr-login" class="screen active">
        <div class="login-card">
            <h1 style="color:var(--neon); font-family:'Orbitron';">BOT V4.0</h1>
            <input type="text" id="license" class="input-key" placeholder="ENTER ACCESS KEY">
            <button class="main-btn" onclick="checkKey()">ACTIVATE SYSTEM</button>
        </div>
    </div>

    <div id="scr-lobby" class="screen">
        <h1 class="lobby-title">SELECT SERVER</h1>
        <div class="game-card" onclick="startEngine('WINGO 30S')">
            <div><span style="color:var(--neon)">●</span> WINGO 30 SEC</div> <span>➔</span>
        </div>
        <div class="game-card" onclick="startEngine('WINGO 1M')">
            <div><span style="color:var(--neon)">●</span> WINGO 1 MIN</div> <span>➔</span>
        </div>
        <div class="game-card" onclick="startEngine('WINGO 3M')">
            <div><span style="color:var(--neon)">●</span> WINGO 3 MIN</div> <span>➔</span>
        </div>
    </div>

    <div id="scr-engine" class="screen">
        <div class="admin-badge">ADMIN MODE: ON</div>
        <button onclick="backToLobby()" style="color:var(--neon); background:none; border:none; margin-bottom:20px; cursor:pointer;">◀ CHANGE GAME</button>
        
        <h2 id="engineTitle" style="color:var(--neon); font-family:'Orbitron';">WINGO 30S</h2>

        <div class="status-header">
            <div style="text-align:left;">
                <div style="color:#888; font-size:12px;">PERIOD</div>
                <div id="periodDisplay" style="font-weight:bold; letter-spacing:1px;">20260415100010001</div>
            </div>
            <div style="text-align:right;">
                <div style="color:#888; font-size:12px;">TIME</div>
                <div id="timerDisplay" style="color:#ffcc00; font-weight:bold; font-size:18px;">00:30</div>
            </div>
        </div>

        <div id="ball" class="ball-engine">?</div>
        <div id="resTxt" style="font-size:45px; font-weight:900; height:60px; letter-spacing:5px;">---</div>

        <button class="main-btn" id="pBtn" onclick="runPrediction()">GET RESULT</button>
        
        <p style="margin-top:20px; font-size:10px; color:rgba(0,255,153,0.3);">ENCRYPTED BY ANIMESH V4.0 SYSTEM</p>
    </div>

    <script>
        let currentMode = '30s';

        function checkKey() {
            if(document.getElementById('license').value.length >= 4) {
                showScreen('scr-lobby');
            }
        }

        function startEngine(game) {
            document.getElementById('engineTitle').innerText = game;
            currentMode = game.includes('30S') ? '30s' : '1m';
            showScreen('scr-engine');
            syncData();
        }

        function backToLobby() { showScreen('scr-lobby'); }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function syncData() {
            setInterval(() => {
                const now = new Date();
                const d = now.getFullYear().toString() + (now.getMonth()+1).toString().padStart(2,'0') + now.getDate().toString().padStart(2,'0');
                let sec = now.getSeconds();
                let remain, count;

                if(currentMode === '30s') {
                    remain = 30 - (sec % 30);
                    count = (now.getHours() * 120) + (now.getMinutes() * 2) + (sec >= 30 ? 1 : 0);
                } else {
                    remain = 60 - sec;
                    count = (now.getHours() * 60) + now.getMinutes();
                }

                document.getElementById('periodDisplay').innerText = d + "10001" + count.toString().padStart(4, '0');
                document.getElementById('timerDisplay').innerText = "00:" + (remain < 10 ? "0"+remain : remain);
                
                if(remain === (currentMode === '30s' ? 30 : 60)) resetEngine();
            }, 1000);
        }

        function runPrediction() {
            const ball = document.getElementById('ball');
            const res = document.getElementById('resTxt');
            const btn = document.getElementById('pBtn');

            btn.disabled = true;
            ball.innerText = "⏳";
            res.innerText = "WAITING";

            setTimeout(() => {
                const n = Math.floor(Math.random() * 10);
                const isBig = n >= 5;
                let c = (n % 2 === 0) ? "var(--red)" : "var(--green)";
                if(n === 0 || n === 5) c = "var(--violet)";

                ball.innerText = n;
                ball.style.background = c;
                ball.style.borderColor = "#fff";
                ball.style.boxShadow = `0 0 40px ${c}`;
                res.innerText = isBig ? "BIG" : "SMALL";
                res.style.color = c;
            }, 2500);
        }

        function resetEngine() {
            const btn = document.getElementById('pBtn');
            btn.disabled = false;
            const ball = document.getElementById('ball');
            ball.innerText = "?";
            ball.style.background = "radial-gradient(circle at 30% 30%, #555, #000)";
            ball.style.boxShadow = "none";
            ball.style.borderColor = "#444";
            document.getElementById('resTxt').innerText = "---";
            document.getElementById('resTxt').style.color = "white";
        }
    </script>
</body>
</html>
