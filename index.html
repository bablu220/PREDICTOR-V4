<!DOCTYPE html>
<html>
<head>
    <title>ADMIN KEY MAKER - V4</title>
    <style>
        body { background: #050a10; color: #00ff99; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { border: 2px solid #00ff99; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 0 20px #00ff99; }
        input { padding: 10px; width: 250px; background: transparent; border: 1px solid #00ff99; color: white; text-align: center; }
        button { background: #00ff99; color: black; padding: 10px 20px; border: none; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>💎 ADMIN KEY MAKER</h2>
        <input type="text" id="genKey" readonly placeholder="Key Yahan Ayegi">
        <br>
        <button onclick="generate16DigitKey()">GENERATE NEW KEY</button>
    </div>

    <script>
        function generate16DigitKey() {
            // Animesh Trader style 16-digit generator (XXXX-XXXX-XXXX-XXXX)
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let key = "";
            for (let i = 0; i < 16; i++) {
                if (i > 0 && i % 4 === 0) key += "-";
                key += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('genKey').value = key;
            
            // Yahan code aayega jo is key ko Firebase mein save karega
            alert("Mubarak ho! Key " + key + " ab active hai."); 
        }
    </script>
</body>
</html>
