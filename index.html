
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICTOR 4.0 | OFFICIAL</title>
    <style>
        :root { --neon: #00ff99; --bg: #050a10; --card: #161d26; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; text-align: center; }
        
        /* Lobby Header */
        .lobby-header { background: linear-gradient(180deg, #1a242c, #050a10); padding: 20px; border-bottom: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon); }
        .title { font-size: 24px; font-weight: 900; letter-spacing: 2px; color: var(--neon); margin: 0; }

        /* Period & Timer - Real Game Style */
        .game-status { display: flex; justify-content: space-between; padding: 15px 20px; background: var(--card); margin: 15px; border-radius: 10px; border: 1px solid #333; }
        .period-info { text-align: left; }
        .period-id { font-size: 16px; font-weight: bold; color: #fff; }
        .timer { font-size: 22px; font-weight: bold; color: #ffcc00; }

        /* Real Ball Container */
        .ball-display { height: 140px; display: flex; justify-content: center; align-items: center; margin: 20px 0; }
        .game-ball { 
            width: 85px; height: 85px; border-radius: 50%; 
            background: radial-gradient(circle at 30% 30%, #555, #000); 
            border: 4px solid #444; display: flex; align-items: center; 
            justify-content: center; font-size: 45px; font-weight: 900;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Prediction Result */
        .prediction-box { font-size: 35px; font-weight: 900; margin: 15px 0; height: 45px; letter-spacing: 4px; }

        /* Professional Button */
        .btn-predict {
            width: 85%; padding: 16px; border-radius: 50px; border: none;
            background: linear-gradient(180deg, var(--neon), #00b36b);
            color: black; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px rgba(0,255,153,0.4); transition: 0.3s;
        }
        .btn-predict:disabled { background: #333; color: #666; box-shadow: none; }
        
        /* Ball Shuffle Animation (Only when predicting) */
        .shuffle { animation: ballMove 0.15s infinite alternate; }
        @keyframes ballMove { from { transform: translateY(-5px); } to { transform: translateY(5px); } }
    </style>
</head>
<body>

    <div class="lobby-header">
        <p class="title">PREDICTOR 4.0</p>
    </div>

    <div class="game-status">
        <div class="period-info">
            <div style="color:#888; font-size:12px; margin-bottom:4px;">Period Number</div>
            <div id="periodDisplay" class="period-id">20260415010001</div>
        </div>
        <div class="timer" id="timerDisplay">00:00</div>
    </div>

    <div class="ball-display">
        <div id="mainBall" class="game-ball">?</div>
    </div>

    <div id="predictionText" class="prediction-box">---</div>

    <button class="btn-predict" id="predBtn" onclick="getGamePrediction()">START PREDICTION</button>

    <script>
        // 1. Exact Period Logic
        function syncGame() {
            const now = new Date();
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const day = now.getDate().toString().padStart(2, '0');
            
            // Period: Date + 01 + Total Minutes passed today
            const totalMinutes = (now.getHours() * 60) + now.getMinutes();
            const periodStr = `${year}${month}${day}01${totalMinutes.toString().padStart(4, '0')}`;
            document.getElementById('periodDisplay').innerText = periodStr;

            // Timer: Seconds remaining in current minute
            const seconds = now.getSeconds();
            const remaining = 60 - seconds;
            document.getElementById('timerDisplay').innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);

            if(remaining === 60) resetForNewRound();
        }
        setInterval(syncGame, 1000);

        // 2. Professional Prediction Logic
        function getGamePrediction() {
            const ball = document.getElementById('mainBall');
            const btn = document.getElementById('predBtn');
            const txt = document.getElementById('predictionText');

            btn.disabled = true;
            ball.classList.add('shuffle');
            ball.innerText = "?";
            ball.style.borderColor = "#ffcc00";
            txt.innerText = "WAIT...";
            txt.style.color = "#ffcc00";

            setTimeout(() => {
                ball.classList.remove('shuffle');
                const num = Math.floor(Math.random() * 10);
                const isBig = num >= 5;
                const color = (num % 2 === 0) ? "#ff4d4d" : "#2ecc71"; // Even=Red, Odd=Green

                ball.innerText = num;
                ball.style.borderColor = color;
                ball.style.boxShadow = `0 0 25px ${color}`;
                
                txt.innerText = isBig ? "BIG" : "SMALL";
                txt.style.color = color;
            }, 2500);
        }

        function resetForNewRound() {
            const btn = document.getElementById('predBtn');
            btn.disabled = false;
            const ball = document.getElementById('mainBall');
            ball.innerText = "?";
            ball.style.borderColor = "#444";
            ball.style.boxShadow = "none";
            document.getElementById('predictionText').innerText = "---";
            document.getElementById('predictionText').style.color = "white";
        }
    </script>
</body>
</html>
