<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICTOR 4.0 | MULTI-GAME HUB</title>
    <style>
        :root { --neon: #00ff99; --bg: #050a10; --red: #ff3333; --green: #2ecc71; --violet: #a64dff; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; text-align: center; }
        
        /* Background Animation */
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(circle at center, #0a192f 0%, #050a10 100%); z-index: -1; }

        /* Login Screen */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { border: 2px solid var(--neon); padding: 40px; border-radius: 20px; box-shadow: 0 0 30px var(--neon); width: 80%; }

        /* Main Lobby */
        .header { background: #1a242c; padding: 15px; border-bottom: 2px solid var(--neon); font-size: 22px; font-weight: 900; color: var(--neon); }
        .game-nav { display: flex; justify-content: center; gap: 10px; margin: 20px; }
        .nav-btn { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .active-nav { background: var(--neon); color: black; }

        /* Status & Ball */
        .status-card { background: rgba(26,36,44,0.9); margin: 15px; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .period-id { font-size: 18px; font-weight: bold; color: #fff; }
        .timer { font-size: 30px; font-weight: 900; color: #ffcc00; margin: 10px 0; }
        
        .ball { width: 90px; height: 90px; border-radius: 50%; background: #222; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 900; border: 4px solid #444; transition: 0.4s; }

        .btn-predict { width: 85%; padding: 18px; border-radius: 50px; border: none; background: var(--neon); color: black; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px var(--neon); }
        
        /* Telegram Button */
        .tg-btn { margin-top: 30px; background: #0088cc; color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div id="login-screen">
        <div class="login-box">
            <h1>V4.0 LOGIN</h1>
            <input type="text" id="keyInput" style="width:90%; padding:15px; margin-bottom:20px; background:transparent; border:1px solid var(--neon); color:white; text-align:center;" placeholder="ENTER LICENSE KEY">
            <button class="btn-predict" onclick="doLogin()">ACTIVATE</button>
        </div>
    </div>

    <div id="app" style="display:none;">
        <div class="header">PREDICTOR 4.0🧩</div>
        
        <div class="game-nav">
            <button class="nav-btn active-nav" id="btn30s" onclick="switchGame('30s')">WINGO 30S</button>
            <button class="nav-btn" id="btn1m" onclick="switchGame('1m')">WINGO 1M</button>
        </div>

        <div class="status-card">
            <div id="gameTitle" style="color:var(--neon); font-weight:bold; margin-bottom:10px;">WINGO 30 SECONDS</div>
            <div id="periodDisplay" class="period-id">SYNCING...</div>
            <div id="timerDisplay" class="timer">00:00</div>
            
            <div id="mainBall" class="ball">?</div>
            <div id="resText" style="font-size:30px; font-weight:900; height:40px;">---</div>
        </div>

        <button class="btn-predict" id="pBtn" onclick="startPrediction()">GET PREDICTION</button>
        
        <br>
        <a href="https://t.me/your_channel" class="tg-btn" target="_blank">JOIN TELEGRAM CHANNEL</a>
    </div>

    <script>
        let currentGame = '30s';

        function doLogin() {
            const key = document.getElementById('keyInput').value;
            if(key.length > 5) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                startClock();
            }
        }

        function switchGame(type) {
            currentGame = type;
            document.getElementById('btn30s').classList.toggle('active-nav', type === '30s');
            document.getElementById('btn1m').classList.toggle('active-nav', type === '1m');
            document.getElementById('gameTitle').innerText = type === '30s' ? "WINGO 30 SECONDS" : "WINGO 1 MINUTE";
            resetUI();
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                const datePart = now.getFullYear().toString() + (now.getMonth() + 1).toString().padStart(2, '0') + now.getDate().toString().padStart(2, '0');
                
                let seconds = now.getSeconds();
                let remaining, periodSuffix;

                if(currentGame === '30s') {
                    remaining = 30 - (seconds % 30);
                    let total30s = (now.getHours() * 120) + (now.getMinutes() * 2) + (seconds >= 30 ? 1 : 0);
                    periodSuffix = "10001" + total30s.toString().padStart(4, '0');
                } else {
                    remaining = 60 - seconds;
                    let total1m = (now.getHours() * 60) + now.getMinutes();
                    periodSuffix = "10001" + total1m.toString().padStart(4, '0');
                }

                document.getElementById('periodDisplay').innerText = datePart + periodSuffix;
                document.getElementById('timerDisplay').innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);
                
                if(remaining === (currentGame === '30s' ? 30 : 60)) resetUI();
            }, 1000);
        }

        function startPrediction() {
            const ball = document.getElementById('mainBall');
            const res = document.getElementById('resText');
            const btn = document.getElementById('pBtn');

            btn.disabled = true;
            ball.innerText = "⏳";
            res.innerText = "ANALYZING...";

            setTimeout(() => {
                const num = Math.floor(Math.random() * 10);
                const isBig = num >= 5;
                let color = (num % 2 === 0) ? "var(--red)" : "var(--green)";
                if(num === 0 || num === 5) color = "var(--violet)";

                ball.innerText = num;
                ball.style.background = color;
                ball.style.boxShadow = `0 0 20px ${color}`;
                res.innerText = isBig ? "BIG" : "SMALL";
                res.style.color = color;
            }, 2000);
        }

        function resetUI() {
            document.getElementById('pBtn').disabled = false;
            const ball = document.getElementById('mainBall');
            ball.innerText = "?";
            ball.style.background = "#222";
            ball.style.boxShadow = "none";
            document.getElementById('resText').innerText = "---";
            document.getElementById('resText').style.color = "white";
        }
    </script>
</body>
</html>
