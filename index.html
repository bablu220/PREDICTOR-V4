<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIGINAL PREDICTOR 4.0</title>
    <style>
        :root { --neon: #00ff99; --bg: #050a10; --red: #ff3333; --green: #2ecc71; --violet: #a64dff; }
        
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        
        /* 1. Standard Classic Header */
        .header { background: #1a242c; padding: 20px; border-bottom: 2px solid var(--neon); color: var(--neon); font-size: 24px; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 10px var(--neon); }

        /* 2. Sync Status & Timer (Standard Look) */
        .status-box { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 10px; margin: 15px; }
        .p-num { font-size: 18px; font-weight: bold; color: #fff; letter-spacing: 1px; }
        .timer { font-size: 24px; font-weight: 900; color: #ffcc00; text-shadow: 0 0 10px #ffcc00; }

        /* 3. Original Game Balls Zone */
        .game-zone { margin: 40px 0; height: 160px; display: flex; align-items: center; justify-content: center; position: relative; }
        .actual-ball {
            width: 100px; height: 100px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 55px; font-weight: 900; color: white;
            background: radial-gradient(circle at 35% 35%, #555, #000);
            border: 5px solid #444; transition: 0.4s;
        }

        .result-txt { font-size: 38px; font-weight: 900; letter-spacing: 5px; margin-top: 10px; height: 50px; text-transform: uppercase; }

        /* 4. Predictor 4.0 Button (Pure Look) */
        .btn-predict {
            width: 85%; padding: 16px; border-radius: 50px; border: none;
            background: linear-gradient(180deg, #00ff99, #00804d);
            color: black; font-size: 19px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,255,153,0.4); transition: 0.3s;
        }
        .btn-predict:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }

        /* 5. Matrix Code Animation (Niche Green Text) */
        #matrix-code { color: rgba(0, 255, 153, 0.4); font-size: 11px; font-family: monospace; position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div class="header">PREDICTOR 4.0🧩</div>

    <div class="status-box">
        <div style="text-align:left">
            <div style="color:#888; font-size:12px; margin-bottom:5px;">Period Number</div>
            <div id="p_id" class="p-num">20260415010001</div>
        </div>
        <div id="t_id" class="timer">00:60</div>
    </div>

    <div class="game-zone">
        <div id="ball" class="actual-ball">?</div>
    </div>

    <div id="res" class="result-txt">READY</div>

    <button class="btn-predict" id="pBtn" onclick="classicPredict()">GET PREDICTION</button>

    <div id="matrix-code">SYS/ACTIVE//SERVER:SECURE-V4//SYNC...</div>

    <script>
        // PERIOD MATCHING & CLOCK
        function updateClassicClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const day = now.getDate().toString().padStart(2, '0');
            
            // Total minutes as Period suffix
            const totalMins = (now.getHours() * 60) + now.getMinutes();
            const periodStr = `${year}${month}${day}01${(1001 + totalMins).toString().slice(1)}`;
            document.getElementById('p_id').innerText = periodStr;

            // Timer countdown
            const seconds = now.getSeconds();
            const remain = 60 - seconds;
            document.getElementById('t_id').innerText = "00:" + (remain < 10 ? "0" + remain : remain);
            
            if(remain === 60) resetForNewMinute();
        }
        setInterval(updateClassicClock, 1000);

        function classicPredict() {
            const ball = document.getElementById('ball');
            const res = document.getElementById('res');
            const btn = document.getElementById('pBtn');

            btn.disabled = true;
            ball.innerText = "...";
            ball.style.fontSize = "18px";
            res.innerText = "ANALYZING";
            res.style.color = "white";

            setTimeout(() => {
                const num = Math.floor(Math.random() * 10);
                const isBig = num >= 5;
                
                // Color matching: Even=Red, Odd=Green
                const color = (num % 2 === 0) ? "var(--red)" : "var(--green)";
                
                ball.innerText = num;
                ball.style.fontSize = "55px";
                ball.style.background = color;
                ball.style.borderColor = "#fff";
                ball.style.boxShadow = `0 0 30px ${color}`;
                
                res.innerText = isBig ? "BIG" : "SMALL";
                res.style.color = color;
            }, 3000);
        }

        function resetForNewMinute() {
            document.getElementById('pBtn').disabled = false;
            const ball = document.getElementById('ball');
            ball.innerText = "?";
            ball.style.background = "radial-gradient(circle at 35% 35%, #555, #000)";
            ball.style.boxShadow = "none";
            ball.style.borderColor = "#444";
            ball.style.fontSize = "55px";
            document.getElementById('res').innerText = "READY";
            document.getElementById('res').style.color = "white";
        }
    </script>
</body>
</html>
