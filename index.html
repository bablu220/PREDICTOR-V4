<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICTOR 4.0 | ULTIMATE HUB</title>
    <style>
        :root { --neon: #00ff99; --bg: #050a10; --red: #ff3333; --green: #2ecc71; --violet: #a64dff; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* Animated Hacker Background */
        .matrix-bg { position: fixed; inset: 0; background: linear-gradient(rgba(0,255,153,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,153,0.03) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; animation: scroll 20s linear infinite; }
        @keyframes scroll { from { background-position: 0 0; } to { background-position: 0 1000px; } }

        /* Header & Tabs */
        .header { background: #1a242c; padding: 15px; border-bottom: 2px solid var(--neon); font-size: 24px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .tab { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; flex: 1; max-width: 150px; }
        .active-tab { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        /* Status Card */
        .card { background: rgba(20, 30, 40, 0.95); border: 1px solid #333; margin: 15px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .timer { font-size: 35px; font-weight: 900; color: #ffcc00; margin: 15px 0; text-shadow: 0 0 10px #ffcc00; }
        .period { font-size: 18px; color: #fff; letter-spacing: 1px; font-weight: bold; }

        /* Original Ball */
        .ball-container { height: 120px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        .game-ball { width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #444, #000); border: 4px solid #444; display: flex; align-items: center; justify-content: center; font-size: 50px; font-weight: 900; transition: 0.3s; }

        .res-text { font-size: 35px; font-weight: 900; height: 45px; letter-spacing: 5px; }

        /* Action Buttons */
        .btn-predict { width: 85%; padding: 18px; border-radius: 50px; border: none; background: var(--neon); color: black; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,255,153,0.4); }
        .btn-predict:disabled { background: #333; color: #666; box-shadow: none; }
        
        .tg-link { margin-top: 25px; display: inline-block; color: #0088cc; text-decoration: none; font-weight: bold; border: 1px solid #0088cc; padding: 10px 20px; border-radius: 30px; }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    <div class="header">PREDICTOR 4.0🧩</div>

    <div class="tabs">
        <div id="tab30" class="tab active-tab" onclick="changeGame('30s')">WINGO 30S</div>
        <div id="tab60" class="tab" onclick="changeGame('1m')">WINGO 1M</div>
    </div>

    <div class="card">
        <div id="gameName" style="color:var(--neon); font-size: 14px; margin-bottom: 10px;">MODE: WINGO 30 SECONDS</div>
        <div id="periodDisplay" class="period">20260415100010001</div>
        <div id="timerDisplay" class="timer">00:30</div>

        <div class="ball-container">
            <div id="ball" class="game-ball">?</div>
        </div>

        <div id="prediction" class="res-text">READY</div>
    </div>

    <button class="btn-predict" id="pBtn" onclick="analyze()">GET PREDICTION</button>
    <br>
    <a href="https://t.me/KulamaniPredictor" class="tg-link">JOIN OFFICIAL TELEGRAM</a>

    <script>
        let mode = '30s';

        function changeGame(g) {
            mode = g;
            document.getElementById('tab30').classList.toggle('active-tab', g === '30s');
            document.getElementById('tab60').classList.toggle('active-tab', g === '1m');
            document.getElementById('gameName').innerText = g === '30s' ? "MODE: WINGO 30 SECONDS" : "MODE: WINGO 1 MINUTE";
            resetRound();
        }

        function updateClock() {
            const now = new Date();
            const dateStr = now.getFullYear().toString() + (now.getMonth() + 1).toString().padStart(2, '0') + now.getDate().toString().padStart(2, '0');
            
            let seconds = now.getSeconds();
            let remaining, periodID;

            if(mode === '30s') {
                remaining = 30 - (seconds % 30);
                let total30s = (now.getHours() * 120) + (now.getMinutes() * 2) + (seconds >= 30 ? 1 : 0);
                periodID = dateStr + "10001" + total30s.toString().padStart(4, '0');
            } else {
                remaining = 60 - seconds;
                let total1m = (now.getHours() * 60) + now.getMinutes();
                periodID = dateStr + "10001" + total1m.toString().padStart(4, '0');
            }

            document.getElementById('periodDisplay').innerText = periodID;
            document.getElementById('timerDisplay').innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);
            
            if(remaining === (mode === '30s' ? 30 : 60)) resetRound();
        }
        setInterval(updateClock, 1000);

        function analyze() {
            const ball = document.getElementById('ball');
            const res = document.getElementById('prediction');
            const btn = document.getElementById('pBtn');

            btn.disabled = true;
            ball.innerText = "⏳";
            res.innerText = "ANALYZING...";
            res.style.color = "white";

            setTimeout(() => {
                const num = Math.floor(Math.random() * 10);
                const isBig = num >= 5;
                let color = (num % 2 === 0) ? "var(--red)" : "var(--green)";
                if(num === 0 || num === 5) color = "var(--violet)";

                ball.innerText = num;
                ball.style.background = color;
                ball.style.boxShadow = `0 0 25px ${color}`;
                ball.style.borderColor = "#fff";
                
                res.innerText = isBig ? "BIG" : "SMALL";
                res.style.color = color;
            }, 2000);
        }

        function resetRound() {
            document.getElementById('pBtn').disabled = false;
            const ball = document.getElementById('ball');
            ball.innerText = "?";
            ball.style.background = "radial-gradient(circle at 30% 30%, #444, #000)";
            ball.style.boxShadow = "none";
            ball.style.borderColor = "#444";
            document.getElementById('prediction').innerText = "READY";
            document.getElementById('prediction').style.color = "white";
        }
    </script>
</body>
</html>
